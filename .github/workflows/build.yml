name: Build UlyxSpigot

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply patches
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --max-workers=4 :paper-server:applyPatches

      - name: Build jar
        run: |
          ./gradlew --no-daemon --max-workers=4 :paper-server:createMojmapBundlerJar

      - name: Upload bundler artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulyxspigot-bundler
          path: paper-server/build/libs/*bundler*.jar
          if-no-files-found: error

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulyxspigot-server
          path: |
            paper-server/build/libs/*.jar
            !paper-server/build/libs/*bundler*.jar
          if-no-files-found: error
